# Standalone tmux config for remote servers (no TPM/plugins required)

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

# start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# mouse support
set -g mouse on

# split panes
unbind '"'
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# enable vi keys
setw -g mode-keys vi

# vim style copy
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# truecolor support
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "screen-256color"

# center the window list
set -g status-justify centre

# kill without confirm
bind x kill-pane
bind & kill-window

# disable launching login shell
set -g default-command "${SHELL}"

# simple status bar styling
set -g status-style "bg=colour235,fg=colour250"
set -g status-left " #S "
set -g status-right " %H:%M "
set -g window-status-current-style "bg=colour25,fg=colour255,bold"
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "
set -g pane-active-border-style "fg=colour25"
